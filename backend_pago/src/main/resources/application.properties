spring.application.name=pago

# parámetros de la conexión
spring.datasource.url=jdbc:mysql://localhost:3306/pago_tienda?serverTimezone=UTC&useSSL=false
spring.datasource.username=root


# Configuración de JPA
spring.jpa.hibernate.ddl-auto=update   
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Configuración de logs (opcional)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#configuracion webpay
jwt.secret=MiClaveUltraSecretaParaPago123456
jwt.expiration=3600000

#servidor
server.port=8083
