spring.application.name=backend_inventario

# parámetros de la conexión
spring.datasource.url=jdbc:mysql://localhost:3306/inventario_tienda?serverTimezone=UTC&useSSL=false
spring.datasource.username=root
#spring.datasource.password=duoc


# Configuración de JPA
spring.jpa.hibernate.ddl-auto=update   
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Configuración de logs (opcional)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#servidor
server.port=8081
